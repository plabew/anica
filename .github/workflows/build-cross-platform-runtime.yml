name: Build Cross-Platform Runtime

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Runtime version tag (e.g., 20260610)'
        required: true
        default: '20260610'
      ffmpeg_version:
        description: 'FFmpeg version'
        required: true
        default: '8.0.1'
      gstreamer_version:
        description: 'GStreamer version'
        required: true
        default: '1.28.1'

permissions:
  contents: write

jobs:
  # ================================================================
  # Windows Runtime
  # ================================================================
  build-windows-runtime:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download FFmpeg LGPL-only build
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-lgpl-shared.zip"
          Write-Host "Downloading FFmpeg LGPL-only from $ffmpegUrl"
          curl.exe -fL --progress-bar $ffmpegUrl -o ffmpeg.zip
          if ($LASTEXITCODE -ne 0) {
            throw "FFmpeg download failed"
          }
          Expand-Archive -Path ffmpeg.zip -DestinationPath .
          Remove-Item ffmpeg.zip

      - name: Download GStreamer MSVC runtime
        run: |
          $gstVersion = "${{ github.event.inputs.gstreamer_version }}"
          $gstUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/${gstVersion}/msvc/gstreamer-1.0-msvc-x86_64-${gstVersion}.msi"
          Write-Host "Downloading GStreamer from $gstUrl"
          curl.exe -fL --progress-bar $gstUrl -o gstreamer.msi
          if ($LASTEXITCODE -ne 0) {
            throw "GStreamer download failed"
          }

      - name: Extract GStreamer MSI
        run: |
          # Extract MSI contents using lessmsi
          $lessmsiUrl = "https://github.com/activescott/lessmsi/releases/download/v1.11.5/lessmsi-v1.11.5.zip"
          curl.exe -fL --progress-bar $lessmsiUrl -o lessmsi.zip
          Expand-Archive -Path lessmsi.zip -DestinationPath lessmsi
          
          # Extract MSI
          .\lessmsi\lessmsi.exe x gstreamer.msi .\gstreamer_extracted\
          
          # Move files to expected structure
          $src = ".\gstreamer_extracted\gstreamer\1.0\msvc_x86_64"
          $dst = ".\gstreamer\${{ github.event.inputs.gstreamer_version }}"
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          
          # Copy bin, lib, etc.
          if (Test-Path "$src\bin") {
            Copy-Item -Path "$src\bin" -Destination $dst -Recurse -Force
          }
          if (Test-Path "$src\lib") {
            Copy-Item -Path "$src\lib" -Destination $dst -Recurse -Force
          }
          
          Remove-Item gstreamer.msi
          Remove-Item -Recurse -Force gstreamer_extracted
          Remove-Item -Recurse -Force lessmsi

      - name: Prune GPL plugins
        run: |
          $gstLib = ".\gstreamer\${{ github.event.inputs.gstreamer_version }}\lib"
          $pluginDir = Join-Path $gstLib "gstreamer-1.0"
          
          if (Test-Path $pluginDir) {
            $excludePatterns = @(
              "gstx264.dll",
              "gstx265.dll",
              "gstfaac.dll",
              "gstfdkaac.dll",
              "gstlame.dll",
              "gstpython.dll",
              "gstgtk.dll",
              "gstlibav.dll"
            )
            
            foreach ($pattern in $excludePatterns) {
              $files = Get-ChildItem -Path $pluginDir -Filter $pattern -ErrorAction SilentlyContinue
              foreach ($file in $files) {
                Write-Host "Removing GPL plugin: $($file.Name)"
                Remove-Item $file.FullName -Force
              }
            }
          }

      - name: Package runtime
        run: |
          $version = "${{ github.event.inputs.version }}"
          $runtimeDir = ".\anica_runtime_windows_${version}"
          
          New-Item -ItemType Directory -Path $runtimeDir -Force | Out-Null
          
          # Move FFmpeg to versioned structure
          $ffmpegDir = Get-ChildItem -Path . -Filter "ffmpeg-*-lgpl-shared" | Select-Object -First 1
          if ($ffmpegDir) {
            $ffmpegDst = Join-Path $runtimeDir "ffmpeg\${{ github.event.inputs.ffmpeg_version }}"
            New-Item -ItemType Directory -Path $ffmpegDst -Force | Out-Null
            
            # Copy bin and lib
            if (Test-Path "$($ffmpegDir.FullName)\bin") {
              Copy-Item -Path "$($ffmpegDir.FullName)\bin" -Destination $ffmpegDst -Recurse -Force
            }
            if (Test-Path "$($ffmpegDir.FullName)\lib") {
              Copy-Item -Path "$($ffmpegDir.FullName)\lib" -Destination $ffmpegDst -Recurse -Force
            }
            
            Remove-Item -Recurse -Force $ffmpegDir.FullName
          }
          
          # Move GStreamer
          $gstSrc = ".\gstreamer\${{ github.event.inputs.gstreamer_version }}"
          $gstDst = Join-Path $runtimeDir "gstreamer\${{ github.event.inputs.gstreamer_version }}"
          if (Test-Path $gstSrc) {
            New-Item -ItemType Directory -Path (Split-Path $gstDst) -Force | Out-Null
            Move-Item -Path $gstSrc -Destination $gstDst -Force
          }
          
          # Create tar.gz (same format as macOS)
          $tarName = "anica_runtime_windows_${version}.tar.gz"
          tar -czf $tarName -C . $runtimeDir
          
          Write-Host "Created: $tarName"
          Get-ChildItem $tarName

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.event.inputs.version }}"
          $tarName = "anica_runtime_windows_${version}.tar.gz"
          $releaseTag = "anica-runtime-${version}"
          
          # Check if release exists, create if not
          $release = gh release view $releaseTag 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating release $releaseTag..."
            gh release create $releaseTag --title "anica-runtime-$version" --notes "Anica runtime $version"
          }
          
          Write-Host "Uploading $tarName to $releaseTag..."
          gh release upload $releaseTag $tarName --clobber
          
          Write-Host "Done!"
          gh release view $releaseTag --json url

  # ================================================================
  # Linux Runtime
  # ================================================================
  build-linux-runtime:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            yasm \
            cmake \
            pkg-config \
            libtool \
            autoconf \
            automake \
            git \
            wget \
            python3 \
            nasm \
            libvpx-dev \
            libaom-dev \
            libsvtav1-dev \
            libopus-dev \
            libvmaf-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad

      - name: Build FFmpeg LGPL-only
        run: |
          FFMPEG_VERSION="${{ github.event.inputs.ffmpeg_version }}"
          wget "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_VERSION}.tar.xz"
          tar -xf "ffmpeg-${FFMPEG_VERSION}.tar.xz"
          cd "ffmpeg-${FFMPEG_VERSION}"
          
          ./configure \
            --prefix="${{ github.workspace }}/ffmpeg_install" \
            --enable-shared \
            --disable-static \
            --disable-gpl \
            --disable-libx264 \
            --disable-libx265 \
            --disable-libxvid \
            --disable-libmp3lame \
            --enable-libvpx \
            --enable-libaom \
            --enable-libsvtav1 \
            --enable-libopus \
            --enable-libvmaf \
            --disable-nonfree \
            --disable-stripping
          
          make -j$(nproc)
          make install
          cd ..

      - name: Package runtime
        run: |
          VERSION="${{ github.event.inputs.version }}"
          FFMPEG_VERSION="${{ github.event.inputs.ffmpeg_version }}"
          GSTREAMER_VERSION="${{ github.event.inputs.gstreamer_version }}"
          
          RUNTIME_DIR="anica_runtime_linux_${VERSION}"
          mkdir -p "${RUNTIME_DIR}/ffmpeg/${FFMPEG_VERSION}"
          mkdir -p "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}"
          
          # Copy FFmpeg build
          cp -r "${{ github.workspace }}/ffmpeg_install/bin" "${RUNTIME_DIR}/ffmpeg/${FFMPEG_VERSION}/"
          cp -r "${{ github.workspace }}/ffmpeg_install/lib" "${RUNTIME_DIR}/ffmpeg/${FFMPEG_VERSION}/"
          
          # Copy GStreamer from system
          # Note: GStreamer on Linux is typically system-installed, so we bundle the runtime libs
          GST_PREFIX="/usr/lib/x86_64-linux-gnu"
          mkdir -p "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib"
          mkdir -p "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/gstreamer-1.0"
          
          # Copy essential GStreamer libs
          cp -r "${GST_PREFIX}/gstreamer-1.0" "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgstreamer-1.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgstbase-1.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgstaudio-1.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgstvideo-1.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgstpbutils-1.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          
          # Also bundle glib dependencies
          cp -L "${GST_PREFIX}/libglib-2.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgobject-2.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          cp -L "${GST_PREFIX}/libgio-2.0.so"* "${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/" || true
          
          # Prune GPL plugins
          PLUGIN_DIR="${RUNTIME_DIR}/gstreamer/${GSTREAMER_VERSION}/lib/gstreamer-1.0"
          if [ -d "${PLUGIN_DIR}" ]; then
            for pattern in gstx264.so gstx265.so gstfaac.so gstfdkaac.so gstlame.so gstpython.so gstgtk.so; do
              find "${PLUGIN_DIR}" -name "${pattern}" -exec rm -f {} \;
            done
          fi
          
          # Create tar.gz
          TAR_NAME="anica_runtime_linux_${VERSION}.tar.gz"
          tar -czf "${TAR_NAME}" "${RUNTIME_DIR}"
          
          echo "Created: ${TAR_NAME}"
          ls -lh "${TAR_NAME}"

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAR_NAME="anica_runtime_linux_${VERSION}.tar.gz"
          RELEASE_TAG="anica-runtime-${VERSION}"
          
          # Check if release exists, create if not
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Creating release ${RELEASE_TAG}..."
            gh release create "${RELEASE_TAG}" --title "anica-runtime-${VERSION}" --notes "Anica runtime ${VERSION}"
          fi
          
          echo "Uploading ${TAR_NAME} to ${RELEASE_TAG}..."
          gh release upload "${RELEASE_TAG}" "${TAR_NAME}" --clobber
          
          echo "Done!"
          gh release view "${RELEASE_TAG}" --json url