name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - "docs/**"

# Cancel in-progress runs for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Primary CI job — macOS only, because the renderer depends on
  # Metal and core-video which are not available on Linux/Windows.
  # ---------------------------------------------------------------
  check:
    name: Check (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml is picked up automatically by rustup.
        run: rustup show

      - name: Install GStreamer
        run: |
          brew install \
            gstreamer \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \
            gst-plugins-ugly \
            gst-editing-services

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Cargo check (workspace)
        run: cargo check --workspace

      - name: Clippy (workspace, correctness+suspicious strict, perf warn)
        run: cargo clippy --workspace --all-targets -- -D clippy::correctness -D clippy::suspicious -W clippy::perf

      - name: Clippy (MotionLoom public crate, zero warnings)
        run: cargo clippy -p motionloom --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

  # ---------------------------------------------------------------
  # Windows compile smoke test — catches cfg(windows), D3D11, and
  # DXGI regressions without launching the GPUI app.
  # ---------------------------------------------------------------
  check-windows:
    name: Check (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml is picked up automatically by rustup.
        run: rustup show

      - name: Install GStreamer SDK
        shell: pwsh
        run: |
          choco install pkgconfiglite gstreamer gstreamer-devel --yes --no-progress
          $gstRoot = "C:\gstreamer\1.0\msvc_x86_64"
          $pkgConfigMirror = "\gst-pkgconfig"
          $drives = @("C:", (Split-Path -Qualifier $env:GITHUB_WORKSPACE)) | Select-Object -Unique
          foreach ($drive in $drives) {
            $mirror = Join-Path $drive "gst-pkgconfig"
            New-Item -ItemType Directory -Path $mirror -Force | Out-Null
            Copy-Item -Path "$gstRoot\lib\pkgconfig\*" -Destination $mirror -Recurse -Force
          }
          "GSTREAMER_1_0_ROOT_MSVC_X86_64=$gstRoot" >> $env:GITHUB_ENV
          "PKG_CONFIG=pkg-config" >> $env:GITHUB_ENV
          "PKG_CONFIG_PATH=$pkgConfigMirror" >> $env:GITHUB_ENV
          "$gstRoot\bin" >> $env:GITHUB_PATH
          $env:PKG_CONFIG_PATH = $pkgConfigMirror
          pkg-config --modversion glib-2.0

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cargo check (Windows workspace)
        run: cargo check --workspace
